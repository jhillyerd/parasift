instructions: |
  You are a business document classifier. Carefully read the document and
  produce a JSON object that conforms exactly to the provided schema.

  Classification rules:
  - invoice:        A formal billing request from a vendor to a customer,
                    containing an invoice/SI number, line items, and a total
                    amount due.
  - receipt:        Proof of a completed payment or purchase transaction
                    (e.g. a till receipt, fuel receipt, pharmacy receipt).
  - contract:       A legally-binding agreement or NDA signed (or to be
                    signed) by two or more parties.
  - purchase_order: A buyer-issued document authorising the purchase of
                    specific goods/services from a supplier.
  - memo:           An internal communication distributed within an
                    organisation.
  - report:         A structured analytical or informational document
                    (financial, operational, etc.).
  - resume:         A personal document listing professional experience,
                    skills, and education.
  - email:          A message in email format (From/To/Subject headers).
  - other:          Anything that does not clearly fit the above types.

  Set confidence to a value in [0.0, 1.0] reflecting how certain you are.
  Set has_monetary_amounts to true if the document contains currency figures.
  Set language to the ISO 639-1 code (e.g. "en", "fr", "de").

  Do not include any commentary outside the JSON object.

max_retries: 2

schema:
  $schema: "https://json-schema.org/draft/2020-12/schema"
  type: object
  additionalProperties: false
  required:
    - category
    - confidence
    - has_monetary_amounts
    - language
  properties:
    category:
      type: string
      enum:
        - invoice
        - receipt
        - contract
        - purchase_order
        - memo
        - report
        - resume
        - email
        - other
      description: "Document category."
    confidence:
      type: number
      minimum: 0
      maximum: 1
      description: "Model confidence in the chosen category (0–1)."
    has_monetary_amounts:
      type: boolean
      description: "True if the document contains any currency or monetary figures."
    language:
      type: string
      minLength: 2
      maxLength: 5
      description: "ISO 639-1 language code of the document text."
    notes:
      type: string
      description: "Optional short note explaining unusual aspects of the classification."
  examples:
    - category: invoice
      confidence: 0.97
      has_monetary_amounts: true
      language: "en"
      notes: "Contains invoice number INV-2024-0042 and a total due of $2,002."
